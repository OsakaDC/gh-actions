name: Continuous Integration
run-name: "Triggered by ${{ github.actor }}"
on:  
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'snapshots/**'
      - 'analyses/**'

  pull_request:
    branches:
      - develop
      - stage
      - main
    types: 
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - 'docs/**'
      - 'snapshots/**'
      - 'analyses/**'

  workflow_dispatch:
    inputs:    
      full-refresh:
        description: wether to do a full refresh
        type: boolean
        required: false
        default: false
      
      models:
        description: comma separated model names or directories
        type: string
        required: false
        default: ''
jobs:
  greet:
    runs-on: ubuntu-slim
    steps: 
      - name: greet
        run: echo Hello
